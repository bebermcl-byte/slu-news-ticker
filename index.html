<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Ticker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0a0a1a;
      display: flex;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .ticker-label {
      background-color: #003087; /* SLU blue */
      color: white;
      font-weight: bold;
      font-size: 22px;
      padding: 0 24px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 2px;
      height: 72px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .ticker-wrapper {
      overflow: hidden;
      flex: 1;
      height: 72px;
      display: flex;
      align-items: center;
    }
    .ticker-content {
      display: inline-block;
      white-space: nowrap;
      color: #ffffff;
      font-size: 28px;
      font-weight: bold;
      animation: ticker-scroll linear infinite;
    }
    @keyframes ticker-scroll {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
    .separator {
      color: #003087; /* SLU blue */
      margin: 0 32px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="ticker-label">📡 NEWS DESK</div>
  <div class="ticker-wrapper">
    <div class="ticker-content" id="ticker">Loading...</div>
  </div>

  <script>
    // ── CONFIGURE THESE THREE VALUES ──────────────────────
    const API_KEY   = 'patex82a1HWl6YVZ1.b77737951b116a9595178d35180ff7f15e44b715b2d818d52e166d3bc386317b';   // Personal Access Token
    const BASE_ID   = 'apppKojScJsuEjTCq';         // Your Base ID
    const TABLE     = 'Reporter Interactions Log'; // exact table name
    // ─────────────────────────────────────────────────────

    const TICKER_FIELD   = 'Ticker text';
    const CHECKBOX_FIELD = 'Add to Ticker';
    const REFRESH_MS     = 5 * 60 * 1000; // re-fetch every 5 minutes

    async function fetchItems() {
      const filter = encodeURIComponent(`{${CHECKBOX_FIELD}} = 1`);
      const url = `https://api.airtable.com/v0/${BASE_ID}/`
                + `${encodeURIComponent(TABLE)}`
                + `?filterByFormula=${filter}`
                + `&fields[]=${encodeURIComponent(TICKER_FIELD)}`
                + `&sort[0][field]=${encodeURIComponent('Interaction Date')}`
                + `&sort[0][direction]=desc`;

      const res = await fetch(url, {
        headers: { Authorization: `Bearer ${API_KEY}` }
      });

      if (!res.ok) throw new Error(`Airtable error ${res.status}`);
      const data = await res.json();
      return data.records
        .map(r => r.fields[TICKER_FIELD])
        .filter(Boolean);
    }

    async function buildTicker() {
      try {
        const items = await fetchItems();
        const el = document.getElementById('ticker');

        if (!items.length) {
          el.textContent = 'No active ticker items.';
          return;
        }

        const html = items
          .map(t => `<span>${t}</span><span class="separator">◆</span>`)
          .join('');

        el.innerHTML = html + html; // doubled for seamless loop

        // Scale speed to text length (longer = slower)
        const duration = Math.max(25, items.join(' ').length * 0.13);
        el.style.animationDuration = `${duration}s`;

      } catch (err) {
        document.getElementById('ticker').textContent =
          '⚠ Error loading ticker — check API key and Base ID.';
        console.error(err);
      }
    }

    buildTicker();
    setInterval(buildTicker, REFRESH_MS);
  </script>
</body>
</html>
